<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | SWIFT</title>
<link rel="stylesheet" href="login.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<!-- NAVBAR -->
<header>
    <div class="logo">Login | SWIFT</div>

    <nav>
        <a href="shop.html?category=trend">Trending</a>
        <a href="shop.html?category=men">Men's Wear</a>
        <a href="shop.html?category=kids">Teen's & Kids</a>
        <a href="shop.html?category=sale" class="sale">%Sale</a>
    </nav>
</header>

<!-- MAIN -->
<section class="login-container">

    <!-- LEFT IMAGE -->
    <div class="left">
        <img src="./images/image5.jpg">
        <div class="overlay-text">
            <h1>SWIFT<br>REWARDS</h1>
            <p>GET REWARDED FOR YOUR IMPACT</p>
        </div>
    </div>

    <!-- RIGHT FORM -->
    <div class="right">

        <!-- TABS -->
        <div class="tabs">
            <button class="active" onclick="showLogin()">LOGIN</button>
            <button class="active" onclick="showSignup()">CREATE ACCOUNT</button>
        </div>

        <!-- LOGIN FORM -->
        <form id="loginForm" class="form active">
            <p>Login to your SWIFT account below.</p>

            <label>Email:</label>
            <input type="email" id="loginEmail" placeholder="Email" required>

            <label>Password:</label>
            <div class="password-box">
                <input type="password" id="loginPassword" placeholder="Password" required>
                <i class="fa fa-eye" onclick="togglePassword()"></i>
            </div>

            <button type="submit" class="btn">Sign In</button>

            <p class="switch" onclick="showSignup()">Create an account</p>
        </form>

        <!-- SIGNUP FORM -->
        <form id="signupForm" class="form">
            <p>Create your Account.</p>

            <label>Name</label>
            <input type="text" id="name" placeholder="Full Name" required>

            <label>Email</label>
            <input type="email" id="email" placeholder="Email" required>

            <label>Password</label>
            <input type="password" id="password" placeholder="Password" required>

            <button type="submit" class="btn">Create Account</button>

            <p class="switch" onclick="showLogin()">Already have an account?</p>
        </form>

    </div>

</section>

<script src="login.js"></script>
</body>
</html>
