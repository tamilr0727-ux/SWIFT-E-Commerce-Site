<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2 style="text-align:center; margin:20px;">Checkout</h2>

<div class="checkout-container">

<form id="paymentForm">

    <h3>Shipping Details</h3>

    <input type="text" placeholder="Full Name" required>
    <input type="text" placeholder="Address" required>
    <input type="text" placeholder="City" required>

    <h3>Payment Method</h3>

    <select id="paymentMethod" onchange="togglePayment()">
        <option value="card">Card</option>
        <option value="upi">UPI</option>
        <option value="cod">Cash on Delivery</option>
    </select>

    <!-- CARD -->
    <div id="cardSection">
        <input type="text" id="cardNumber" placeholder="Card Number">
        <input type="text" id="expiry" placeholder="Expiry Date">
        <input type="text" id="cvv" placeholder="CVV">
    </div>

    <!-- UPI -->
    <div id="upiSection" style="display:none;">
        <input type="text" id="upiId" placeholder="Enter UPI ID">
    </div>

    <!-- COD -->
    <div id="codSection" style="display:none;">
        <p>Pay with cash when your order is delivered.</p>
    </div>

    <button type="submit">Place Order</button>

</form>

</div>

<script src="checkout.js"></script>
</body>
